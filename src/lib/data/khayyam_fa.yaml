title: رباعیات خیام
author: Omar Khayyam
source: Mehdi Sadeghi
source_url: https://github.com/mehdisadeghi
license: CC BY 4.0
language: fa

texts:
  - number: 1
    text: |
      خاکی که بزیر پای هر نادانی است
      کفّ صنمی و چهره جانانی است
      هر خشت که بر کنگره ایوانی است
      انگشت وزیر یا سر سلطانی است
  - number: 2
    text: |
      چون عهده نمی‌شود کسی فردا را
      حالی خوش کن تو این دل شیدا را
      می نوش، بماهتاب ای ماه که ماه
      بسیار بتابد و نیابد ما را
  - number: 3
    text: |
      هرچند که موی و روی زیباست مرا
      چون لاله رخ و چو سرو بالاست مرا
      معلوم نشد که در طربخانه‌ی خاک
      نقاش ازل بهر چه آراست مرا
  - number: 4
    text: |
      در دایره‌ای کامدن و رفتن ماست
      او را نه ابدیت نه نهایت پیداست
      کس می‌نزند دمی در این معنی راست
      کاین آمدن از کجا و رفتن به کجاست
  - number: 5
    text: |
      نیکی و بدی که در نهاد بشر است
      شادی و غمی که در قضا و قدر است
      با چرخ مکن حواله کاندر رهِ عقل
      چرخ از تو هزار بار بیچاره‌تر است
  - number: 6
    text: |
      گویند کسان بهشت با حور خوش است
      من می‌گویم که آب انگور خوش است
      این نقد بگیر و دست از آن نسیه بدار
      کاواز دُهُل شنیدن از دور خوش است
  - number: 7
    text: |
      بر چهره‌یِ گل شبنم نوروز خوش است
      در صحن چمن روی دلفروز خوش است
      از دی که گذشت هر چه گویی خوش نیست
      خوش باش و ز دی مگو که امروز خوش است
  - number: 8
    text: |
      این کهنه رباط را که عالم نام است
      وآرامگه ابلق صبح و شام است
      بزمیست که وامانده‌ی صد جمشید است
      گوریست که خوابگاه صد بهرام است
  - number: 9
    text: |
      این کوزه چو من عاشق زاری بوده است
      در بند خم زلف نگاری بوده است
      این دسته که بر گردن او می‌بینی
      دستی است که بر گردن یاری بوده است
  - number: 10
    text: |
      پیش از من و تو لیل و نهاری بوده است
      گردنده فلک برای کاری بوده است
      زنهار قدم بخاک آهسته نهی
      کان مردمک چشم نگاری بوده است
  - number: 11
    text: |
      هر سبزه که بر روی زمینی بوده است
      شمشاد قد زهره‌جبینی بوده است
      گرد از سر آستین به آزرم فشان
      کانهم رخ یار نازنینی بوده است
  - number: 12
    text: |
      ساقی گل و سبزه بس طربناک شده است
      دریاب که هفته‌ی دگر خاک شده است
      می نوش و گلی بچین که تا در نگری
      گل خاک شده است و سبزه خاشاک شده است
  - number: 13
    text: |
      از من رمقی به سعی ساقی مانده است
      وز صحبت خلق بی‌وفاقی مانده است
      از باده‌ی دوشین قدحی بیش نماند
      از عمر ندانم که چه باقی مانده است
  - number: 14
    text: |
      ترکیب طبایع چو بکام تو دمی است
      رو شاد بزی اگرچه بر تو ستمی است
      با اهل خرد باش که اصل تن تو
      گردی و شراریّ و نسیمی و نمی است
  - number: 15
    text: |
      چون لاله به نوروز قدح گیر به دست
      با لاله‌رخی اگر ترا فرصت هست
      می نوش به خرّمی که این چرخ کهن
      ناگاه ترا چو خاک گرداند پست
  - number: 16
    text: |
      چون نیست حقیقت و یقین اندر دست
      نتوان به گمان و شک همه عمر نشست
      هان تا ننهیم جام می از کف دست
      در بی‌خبری مرد چه هشتیار و چه مست
  - number: 17
    text: |
      چون ابر به نوروز رخ لاله بشست
      برخیز و به جام باده کن عزم درست
      کاین سبزه که امروز تماشاگه تست
      فردا همه از خاک تو برخواهد رست
  - number: 18
    text: |
      خیّام اگر ز باده مستی خوش باش
      با ماهرُخی اگر نشستی خوش باش
      چون عاقبت کار جهان نیستی است
      اِنگار که نیستی چو هستی خوش باش
  - number: 19
    text: |
      امروز ترا دسترس فردا نیست
      واندیشه‌ی فردات بجز سودا نیست
      ضایع مکن این دم ار دلت شیدا نیست
      کاین باقی عمر را بقا پیدا نیست
  - number: 20
    text: |
      در پرده‌ی اسرار کسی را ره نیست
      زین تعبیه جان هیچ کس آگه نیست
      جز در دل خاک تیره منزلگه نیست
      می خور که چنین فسانه‌ها کوته نیست
  - number: 21
    text: |
      من هیچ ندانم که مرا آنکه سرشت
      کرد اهل بهشت خوب یا دوزخ زشت
      جامی و بتی و بربطی بر لب کشت
      این هر سه مرا نقد و ترا نسیه بهشت
  - number: 22
    text: |
      این یک دو سه روز نوبت عمر گذشت
      چون آب به جویبار و چون باد به دشت
      هرگز غم دو روز مرا یاد نگشت
      روزی که نیامدست و روزی که گذشت
  - number: 23
    text: |
      فصل گل و طرف جویبار و لب کشت
      با یک دو سه اهل و لعبتی حورسرشت
      پیش آر قدح که باده‌نوشان صبوح
      آسوده ز مسجدند و فارغ ز کنشت
  - number: 24
    text: |
      چون چرخ به کام یک خردمند نگشت
      خواهی تو فلک هفت شِمُر خواهی هشت
      چون باید مرد و بودنی‌ها همه هِشت
      چه مور خورد به گور و چه گرگ به دشت
  - number: 25
    text: |
      مهتاب به نور دامن شب بشکافت
      دریاب دمی خوش‌تر ازین نتوان یافت
      می نوش و نیندیش که مهتاب بسی
      اندر سر گور یک به یک خواهد تافت
  - number: 26
    text: |
      چون بلبل مست راه در بستان یافت
      روی گل و جام باده را خندان یافت
      آمد به زبان حال در گوشم گفت
      دریاب که عمر رفته را نتوان یافت
  - number: 27
    text: |
      می خور که به زیر گل بسی خواهی خفت
      بی مونس و بی رفیق و بی همدم و جفت
      زنهار به کس مگو تو این راز نهفت
      هر لاله که پژمرد نخواهد بشکفت
  - number: 28
    text: |
      آن قصر که جمشید در او جام گرفت
      آهو بچه کرد و روبَه آرام گرفت
      بهرام که گور می‌گرفتی همه عمر
      دیدی که چگونه گور بهرام گرفت
  - number: 29
    text: |
      این بحر وجود آمده بیرون ز نهفت
      کس نیست که این گوهر تحقیق بسفت
      هر کس سخنی از سر سودا گفتند
      زانروی که هست کس نمی‌داند گفت
  - number: 30
    text: |
      چون عمر بسر رسد چه بغداد و چه بلخ
      پیمانه چو پر شود چه شیرین و چه تلخ
      می نوش که بعد از من و تو ما بسی
      از سلخ به غرّه آید از غرّه به سلخ
  - number: 31
    text: |
      کس مشکل اسرار ازل را نگشاد
      کس یک قدم از نهاد بیرون ننهاد
      چون می‌نگرم ز مبتدی تا استاد
      عجز است بدست هرکه از مادر زاد
  - number: 32
    text: |
      هر کو به سلامت است و نانی دارد
      وز بهر نشستن آشیانی دارد
      نه خادم کس بود نه مخدوم کسی
      گو شاد بزی که خوش جهانی دارد
  - number: 33
    text: |
      چون روزی و عمر بیش و کم نتوان کرد
      دل را به کم و بیش دژم نتوان کرد
      کار من و تو چنانکه رای من و تست
      از موم بدست خویش هم نتوان کرد
  - number: 34
    text: |
      این قافله‌ی عمر عجب می‌گذرد
      دریاب دمی که با طرب می‌گذرد
      ساقی غم فردای حریفان چه خوری
      پیش آر پیاله را که شب می‌گذرد
  - number: 35
    text: |
      ای چرخ فلک خرابی از کینه‌ی توست
      بیدادگری شیوه‌ی دیرینه‌ی توست
      ای خاک اگر سینه‌ی تو بشکافند
      بس گوهر قیمتی که در سینه‌ی توست
  - number: 36
    text: |
      گر یک نفست ز زندگانی گذرد
      مگذار که جز به شادمانی گذرد
      زنهار که سرمایه‌ی این ملک وجود
      عمر است چنان کش گذرانی گذرد
  - number: 37
    text: |
      هر راز که اندر دل دانا باشد
      باید که نهفته تر ز عنقا باشد
      کاندر صدف از نهفتگی گردد دُرّ
      آن قطره که راز دل دریا باشد
  - number: 38
    text: |
      گویند بهشت و حور و کوثر باشد
      جوی می و شیر و شهد و شکّر باشد
      پر کن قدح باده و بر دستم نه
      نقدی ز هزار نسیه بهتر باشد
  - number: 39
    text: |
      یک قطره‌ی آب بود و با دریا شد
      یک ذرّه‌ی خاک و با زمین یکتا شد
      آمد شدن تو اندرین عالم چیست
      آمد مگسی پدید و ناپیدا شد
  - number: 40
    text: |
      هرگز دل من ز علم محروم نشد
      کم ماند ز اسرار که مفهوم نشد
      هفتاد و دو سال فکر کردم شب و روز
      معلومم شد که هیچ معلوم نشد
  - number: 41
    text: |
      افسوس که نامه‌ی جوانی طی شد
      وان تازه بهار زندگانی دی شد
      آن مرغ طرب که نام او بود شباب
      افسوس ندانم که کی آمد کی شد
  - number: 42
    text: |
      آنانکه محیط فضل و آداب شدند
      در کشف علوم شمع اصحاب شدند
      ره زین شب تاریک نبردند برون
      گفتند فسانه‌ای و در خواب شدند
  - number: 43
    text: |
      یاران موافق همه از دست شدند
      در پای اجل یکان یکان پست شدند
      خوردیم ز یک شراب در مجلس عمر
      دوری دو سه پیشتر ز ما مست شدند
  - number: 44
    text: |
      زان پیش که بر سرت شبیخون آرند
      فرمای که تا باده‌ی گلگون آرند
      تو زر نئی ای غافل نادان که ترا
      در خاک نهند و باز بیرون آرند
  - number: 45
    text: |
      آنانکه به کار عقل در می‌کوشند
      بیهوده بود که گاو نر می‌دوشند
      آن به که لباس ابلهی در پوشند
      کامروز به عقل ترّه می‌نفروشند
  - number: 46
    text: |
      بر من قلم قضا چو بی من رانند
      پس نیک و بدش چرا از من می‌دانند
      دی بی من و امروز چو دی بی من و تو
      فردا به چه حجّتم به داور خوانند
  - number: 47
    text: |
      اجرام که ساکنان این ایوانند
      اسباب تردّد خردمندانند
      هان تا سر رشته‌ی خرد گم نکنی
      کانان که مدبّرند سرگردانند
  - number: 48
    text: |
      آنها که کهن شدند و اینها که نوند
      هر یک بمراد خویش یک تک بدوند
      این کهنه جهان بکس نماند باقی
      رفتند و رویم و دیگر آیند و روند
  - number: 49
    text: |
      در دهر چو آواز گل تازه دهند
      فرمای بتا که می به اندازه دهند
      از دوزخ و از بهشت و ز حور و قصور
      فارغ بنشین کاین همه آوازه دهند
  - number: 50
    text: |
      بر چشم تو عالم ار چه می‌آرایند
      مگرای بدان که عاقلان نگرایند
      بسیار چو تو شدند و بسیار آیند
      بربای نصیحت خویش کت بربایند
  - number: 51
    text: |
      ای بس که نباشیم و جهان خواهد بود
      نی نام ز ما و نی نشان خواهد بود
      زین پیش نبودیم و نبد هیچ خلل
      زین پس چو نباشیم همان خواهد بود
  - number: 52
    text: |
      گویند که فردوس برین خواهد بود
      وانجا می ناب و حور عین خواهد بود
      گر ما می و معشوقه گزیدیم رواست
      چون عاقبت کار چنین خواهد بود
  - number: 53
    text: |
      آورد به اضطرارم اول به وجود
      جز حیرتم از حیات خیری نفزود
      رفتیم به اکراه و ندانیم چه بود
      زین آمدن و بودن و رفتن مقصود
  - number: 54
    text: |
      دهقان قضا بسی چو ما کِشت و درود
      غم خوردن بیهوده نمیدارد سود
      پر کن قدح می به کفم در نه زود
      تا باز خوردم که بودنیها همه بود
  - number: 55
    text: |
      ز آوردن من نبود گردون را سود
      وز بردن من جاه و جلالش نفزود
      وز هیچ کسی نیز دو گوشم نشنود
      کاوردن و بردن من از بهر چه بود
  - number: 56
    text: |
      دی کوزه‌گری بدیدم اندر بازار
      بر پاره گلی لگد همی زد بسیار
      وان گل به زبان حال می‌گفت به او
      من هم چو تو بوده‌ام مرا نیکو دار
  - number: 57
    text: |
      عمرت چه دوصد بود چه سیصد چه هزار
      زین کهنه سرا برون برندت ناجار
      گر پادشهی وگر گدای بازار
      این هر دو به یک نرخ بود آخر کار
  - number: 58
    text: |
      ای دل غم این جهان فرسوده مخور
      بیهوده نئی غمان بیهوده مخور
      چون بوده گذشت و نیست نابوده پدید
      خوش باش و غم بوده و نابوده مخور
  - number: 59
    text: |
      گر باده خوری تو با خردمندان خور
      یا با صنمی لاله‌رخی خندان خور
      بسیار مخور وِرد مکن فاش مساز
      اندک خور و گهگاه خور و پنهان خور
  - number: 60
    text: |
      ای دل همه اسباب جهان خواسته گیر
      باغ طربت به سبزه آراسته گیر
      آنگاه برآن سبزه شبی چون شبنم
      بنشسته و بامداد برخاسته گیر
  - number: 61
    text: |
      لب بر لب کوزه بردم از غایت آز
      تازو طلبم واسطه‌ی عمر دراز
      لب بر لب من نهاد و می‌گفت به راز
      من هم چو تو بوده‌ام دمی با من ساز
  - number: 62
    text: |
      ما لعبتکانیم و فلک لعبت باز
      از روی حقیقتی نه از روی مجاز
      بازی چو همی کنیم بر نطع وجود
      افتیم به صندوق عدم یک یک باز
  - number: 63
    text: |
      از جمله‌ی رفتگان این راه دراز
      باز آمده‌ای کو که به ما گوید باز
      پس بر سر این دوراهه‌ی آز و نیاز
      تا هیچ نمانی که نمی‌آیی باز
  - number: 64
    text: |
      وقت سحر است خیز ای مایه‌ی ناز
      نرمک نرمک باده خور و چنگ نواز
      کاینها که بجایند نپایند بسی
      وانها که شدند کس نمیاید باز
  - number: 65
    text: |
      آنی که نبودت به خور و خواب نیاز
      کردند نیازمندت این چار انباز
      هر یک به تو آنچه داد بستانَد باز
      تا باز چنان شوی که بودی زآغاز
  - number: 66
    text: |
      ای پیر خردمند پگه‌تر برخیز
      وان کودک خاک‌بیز را بنگر تیز
      پندش ده و گو که نرم نرمک می‌بیز
      مغز سر کیقباد و چشم پرویز
  - number: 67
    text: |
      از حادثه‌ی زمان زاینده مترس
      از هرچه رسد چو نیست پاینده مترس
      این یکدم نقد را به عشرت بگذار
      وز رفته میندیش و زآینده مترس
  - number: 68
    text: |
      مرغی دیدم نشسته بر باره‌ی توس
      در پیش نهاده کلّه‌ی کیکاووس
      با کلّه همی گفت که افسوس افسوس
      کو بانک جرس‌ها و کجا ناله‌ی کوس
  - number: 69
    text: |
      جامی است که عقل آفرین می‌زندش
      صد بوسه ز مهر بر جبین می‌زندش
      این کوزه گرد دهر چنین جام لطیف
      می‌سازد و باز بر زمین می‌زندش
  - number: 70
    text: |
      در کارگه کوزه‌گری رفتم دوش
      دیدم دو هزار کوزه گویا و خموش
      ناگاه یکی کوزه برآورد خروش
      کو کوزه‌گر و کوزه‌خر و کوزه‌فروش
  - number: 71
    text: |
      خورشید بِگِل نهفت می‌نتوانم
      واسرار زمانه گفت می‌نتوانم
      از بحر تفکرم برآورد خِرد
      درّی که زبیم سفت می‌نتوانم
  - number: 72
    text: |
      هر یکچندی یکی برآید که منم
      با دولت و با سیم و زر آید که منم
      چون کارک او نظام گیرد روزی
      ناگه اجل از کمین درآید که منم
  - number: 73
    text: |
      بر بستر خاک، خفتگان می‌بینیم
      در زیر زمین نهفتگان می‌بینیم
      چندانکه به صحرای عدم می‌نگرم
      ناآمدگان و رفتگان می‌بینم
  - number: 74
    text: |
      یکچند ب کودکی به استاد شدیم
      یکچند به استادی خود شاد شدیم
      پایان سخن شنو که ما را چه رسید
      چون آب برآمدیم و چون باد شدیم
  - number: 75
    text: |
      ای صاحب فتوی ز تو پرگارتریم
      با اینهمه مستی ز تو هشیارتریم
      تو خون کسان خوری و ما خون رَزان
      انصاف بده کدام خونخوارتریم
  - number: 76
    text: |
      ای دوست بیا تا غم فردا نخوریم
      وین یکدم نقد را غنیمت شمریم
      فردا که ازین دیر کهن درگذریم
      با هفت هزار سالگان سر به سریم
  - number: 77
    text: |
      جاوید نیم چو اندرین دهر مقیم
      پس بی می و معشوقه خطائیست عظیم
      تا کی ز قدیم و محدث ای مرد حکیم
      رفتیم چو ما جهان چه محدث چه قدیم
  - number: 78
    text: |
      این چرخ فلک که ما در او حیرانیم
      فانوس خیال از او مثالی دانیم
      خورشید چراغ‌دان و عالم فانوس
      ما چون صوریم کاندران گردانیم
  - number: 79
    text: |
      دشمن به غلط گفت که من فلسفیم
      ایزد داند که آنچه او گفت نیم
      لیکن چو در این غم آشیان آمده‌ام
      آخر کم از آن که من بدانم که کیم
  - number: 80
    text: |
      تا دست به اتفاق بر هم نزنیم
      پائی ز نشاط بر سرِ غم نزنیم
      پیش از گه صبحدم صبوحی نزنیم
      کاین صبح بسی دمد که ما دم نزنیم
  - number: 81
    text: |
      چون حاصل آدمی در این شورستان
      جز خوردن غصّه نیست تا کندن جان
      خرّم دل آنکه زین جهان زود برفت
      وآسوده کسی که خود نیامد به جهان
  - number: 82
    text: |
      گرد بر فلکم دست بُدی چون یزدان
      برداشتمی من این فلک را ز میان
      وز نو فلکی دگر چنان ساختمی
      کازاده بکام دل رسیدی آسان
  - number: 83
    text: |
      برخیز و مخور غم جهان گذران
      خوشباش و دمی بشادمانی گذران
      در طبح جهان اگر وفائی بودی
      نوبت به تو خود نیامدی از دگران
  - number: 84
    text: |
      می نوش که عمر جاودانی این است
