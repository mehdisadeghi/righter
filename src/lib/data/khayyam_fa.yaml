      تا عمر گرانمایه بدان نفروشی
  - number: 101
    text: |
      آنانکه ز پیش رفته‌اند ای ساقی
      در خاک غرور خفته‌اند ای ساقی
      رو باده خور و حقیقت از من بشنو
      باد است هرآنچه گفته‌اند ای ساقی
  - number: 102
    text: |
      گر دست دهد ز مغز گندم نانی
